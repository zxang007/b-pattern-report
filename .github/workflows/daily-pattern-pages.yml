name: Daily Market Pattern Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 08:05 Beijing time.
    - cron: "5 0 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build report
        env:
          REPORT_PASSWORD_SHA256: "95d5676ebf51015334a1372f463731b8aa225a365642ec6108b39cd9061d8628"
        run: |
          mkdir -p public
          SCAN_START_DATE="$(python3 -c 'import datetime as d; now=d.datetime.now(d.timezone(d.timedelta(hours=8))).date(); y=now.year; m=now.month-2; y-=1 if m<=0 else 0; m+=12 if m<=0 else 0; print(d.date(y,m,15).isoformat())')"
          SCAN_END_DATE="$(python3 -c 'import datetime as d; print(d.datetime.now(d.timezone(d.timedelta(hours=8))).date().isoformat())')"
          echo "scan_window=${SCAN_START_DATE}..${SCAN_END_DATE}"
          python scan_four_h_segment_arc_market.py \
            --start-date "$SCAN_START_DATE" \
            --end-date "$SCAN_END_DATE" \
            --csv-file public/market_pattern_matches.csv \
            --symbols-file futures_symbols_2026.txt \
            --archive-granularity auto \
            --workers 8 \
            --progress-every 25 \
            --archive-sleep 0 \
            --limit 500 \
            --per-symbol-limit 2 \
            --timeout 20 \
            --retries 2 \
            --failed-retry-passes 0 \
            --insecure
          python - <<'PY'
          import csv
          path = "public/market_pattern_matches.csv"
          with open(path, newline="", encoding="utf-8") as handle:
              reader = csv.DictReader(handle)
              rows = list(reader)
              fieldnames = reader.fieldnames
          rows.sort(key=lambda row: (row.get("symbol", ""), row.get("wash_start_bj", ""), row.get("wash_end_bj", "")))
          with open(path, "w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(handle, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)
          print(f"final_scan_rows={len(rows)}")
          if not rows:
              raise SystemExit("No matches after API + archive fallback; refusing to deploy an empty report.")
          PY
          python draw_market_current_logic_from_csv.py \
            --csv-file public/market_pattern_matches.csv \
            --out-dir public \
            --start-date "$SCAN_START_DATE" \
            --end-date "$SCAN_END_DATE" \
            --archive-granularity auto \
            --timeout 8 \
            --retries 2 \
            --retry-delay 0.6 \
            --password-hash "$REPORT_PASSWORD_SHA256" \
            --insecure
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
